<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkySense — Portal Proveedores</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --sky-deep:#0A1628;--sky-blue:#1B4B8A;--sky-accent:#2D7DD2;
      --sky-light:#5BA4F5;--sky-glow:#7EC8E3;--surface:#111E33;--surface3:#1E2E4A;
      --border:rgba(45,125,210,0.2);--text:#E8F0FE;--text-muted:#7A9CC4;--text-dim:#4A6A8A;
      --green:#10B981;--red:#EF4444;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Inter',-apple-system,sans-serif;
      background:radial-gradient(ellipse at 25% 35%,rgba(27,75,138,.45) 0%,transparent 55%),
        radial-gradient(ellipse at 75% 75%,rgba(45,125,210,.18) 0%,transparent 50%),#0A1628;
      color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;
    }
    .card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:48px 42px;width:100%;max-width:400px;box-shadow:0 28px 70px rgba(0,0,0,.55)}
    .logo{text-align:center;margin-bottom:38px}
    .logo-icon{width:60px;height:60px;background:linear-gradient(135deg,var(--sky-accent),var(--sky-glow));border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:14px;box-shadow:0 10px 28px rgba(45,125,210,.45)}
    .logo-name{font-size:22px;font-weight:700;letter-spacing:-.02em}
    .logo-sub{font-size:13px;color:var(--text-muted);margin-top:3px}
    label{display:block;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px}
    input{width:100%;background:var(--surface3);border:1px solid var(--border);border-radius:9px;padding:12px 15px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;margin-bottom:16px}
    input:focus{border-color:var(--sky-accent)}
    .forgot{display:block;text-align:right;font-size:12px;color:var(--sky-light);cursor:pointer;margin-top:-10px;margin-bottom:22px;text-decoration:none}
    .forgot:hover{text-decoration:underline}
    .btn{width:100%;background:linear-gradient(135deg,var(--sky-accent),var(--sky-blue));border:none;border-radius:9px;padding:14px;color:white;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s,transform .1s}
    .btn:hover{opacity:.9;transform:translateY(-1px)}
    .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .msg{margin-top:14px;padding:10px 14px;border-radius:8px;font-size:12px;text-align:center;display:none}
    .msg.error{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#F87171}
    .msg.success{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:#34D399}
    .msg.show{display:block}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .note{text-align:center;font-size:11px;color:var(--text-dim);margin-top:20px;line-height:1.6}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">✦</div>
      <div class="logo-name">SkySense</div>
      <div class="logo-sub">Portal Proveedores</div>
    </div>
    <label for="email">Correo electrónico</label>
    <input id="email" type="email" placeholder="correo@empresa.com" autocomplete="email"/>
    <label for="pass">Contraseña</label>
    <input id="pass" type="password" placeholder="••••••••" autocomplete="current-password"/>
    <a class="forgot" href="#" id="forgot">¿Olvidaste tu contraseña?</a>
    <button class="btn" id="btn-login" onclick="login()">Ingresar</button>
    <div class="msg error" id="msg-err"></div>
    <div class="msg success" id="msg-ok"></div>
    <p class="note">Tu acceso y permisos están configurados por el administrador del portal.<br/>Si tienes problemas, comunícate con el equipo de compras.</p>
  </div>

  <script>
    const SURL = 'https://vczbnaueqgedssdnylqo.supabase.co';
    const SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZjemJuYXVlcWdlZHNzZG55bHFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2NjYyMDMsImV4cCI6MjEwMDI0MjIwM30.7BCJmopnWhDcYxWHZUALnvJmhnSnxiucpO2CRxNOiF8';
    const { createClient } = supabase;
    const sb = createClient(SURL, SKEY);

    // Rutas por rol — nombres definitivos
    const ROUTES = {
      admin:     'skysense_portal_dashboard.html',
      compras:   'skysense_portal_dashboard.html',
      proveedor: 'skysense_portal_proveedor.html'
    };

    function msg(type, text) {
      document.querySelectorAll('.msg').forEach(el => el.classList.remove('show'));
      const el = document.getElementById('msg-' + type);
      el.textContent = text;
      el.classList.add('show');
    }

    function setLoading(on) {
      const btn = document.getElementById('btn-login');
      btn.disabled = on;
      btn.innerHTML = on ? '<span class="spinner"></span>Ingresando…' : 'Ingresar';
    }

    async function login() {
      const email = document.getElementById('email').value.trim();
      const pass  = document.getElementById('pass').value;
      if (!email || !pass) { msg('err', 'Ingresa tu correo y contraseña.'); return; }
      setLoading(true);
      try {
        const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
        if (error) throw error;
        const { data: profile, error: pe } = await sb.from('profiles').select('role,full_name,is_active').eq('id', data.user.id).single();
        if (pe || !profile)      throw new Error('No se encontró tu perfil. Contacta al administrador.');
        if (!profile.is_active)  throw new Error('Tu cuenta está desactivada. Contacta al administrador.');
        msg('ok', `Bienvenido, ${profile.full_name}. Redirigiendo…`);
        setTimeout(() => window.location.href = ROUTES[profile.role] || ROUTES.admin, 1000);
      } catch (err) {
        const map = {
          'Invalid login credentials': 'Correo o contraseña incorrectos.',
          'Email not confirmed':       'Confirma tu correo antes de ingresar.',
          'Too many requests':         'Demasiados intentos. Espera unos minutos.',
        };
        msg('err', map[err.message] || err.message || 'Error al ingresar.');
        setLoading(false);
      }
    }

    document.getElementById('forgot').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      if (!email) { msg('err', 'Ingresa tu correo primero.'); return; }
      const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + '/reset.html' });
      error ? msg('err', 'Error al enviar correo.') : msg('ok', 'Te enviamos un correo para restablecer tu contraseña.');
    });

    document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

    // Si ya hay sesión activa → redirigir directo
    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) return;
      const { data: p } = await sb.from('profiles').select('role').eq('id', session.user.id).single();
      if (p?.role) window.location.href = ROUTES[p.role] || ROUTES.admin;
    })();
  </script>
</body>
</html>
